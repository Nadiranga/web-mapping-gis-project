<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Webmapp 201</title>

      rel="stylesheet"

    <link

    <link

    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/MarkerCluster.css') }}"
    />
    <link
      rel="stylesheet"

    <link

    <script src="{{ url_for('static', filename='js/leaflet-src.js') }}"></script>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

    <style>
      /* 1. Basic Reset & Font */
      * {
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        margin: 0;
        padding: 0;
        display: flex; /* Flexbox keeps map and sidebar perfectly side-by-side */
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        background-color: #f4f4f9;
      }

      /* 2. Map Container */
      #mapdiv {
        flex: 1; /* Tells the map to take up all remaining width */
        height: 100vh;
        position: relative;
        z-index: 1;
      }

      /* 3. Solid, Professional Sidebar */
      #side-bar {
        width: 350px; /* Fixed width for the sidebar */
        background-color: #ffffff; /* Solid white background for readability */
        box-shadow: -4px 0 15px rgba(0, 0, 0, 0.1); /* Adds depth */
        z-index: 1000;
        display: flex;
        flex-direction: column;
        overflow-y: auto; /* Adds a scrollbar if you add too many tasks */
      }

      /* 4. Header Section */
      .sidebar-header {
        padding: 25px 20px;
        border-bottom: 1px solid #eaeaea;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .sidebar-header img {
        width: 60px;
        height: auto;
        margin-bottom: 15px;
      }

      .sidebar-header h3 {
        margin: 0;
        font-size: 22px;
        color: #2c3e50;
      }

      /* 5. Task Buttons Styling */
      .tasks-container {
        padding: 20px;
        flex-grow: 1; /* Pushes the team members to the bottom */
      }

      .tasks-container button {
        width: 100%;
        margin-bottom: 10px;
        padding: 12px 15px;
        background-color: #ffffff;
        border: 1px solid #dcdde1;
        border-radius: 6px;
        color: #353b48;
        font-size: 14px;
        font-weight: 600;
        text-align: left;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      /* Interactive Hover Effect */
      .tasks-container button:hover {
        background-color: #4a148c; /* Dalarna Purple */
        color: #ffffff;
        border-color: #4a148c;
        box-shadow: 0 4px 6px rgba(74, 20, 140, 0.2);
        transform: translateY(-2px); /* Slight lift effect */
      }

      /* 6. Group Members Formatting */
      .team-section {
        padding: 20px;
        background-color: #f8f9fa;
        border-top: 1px solid #eaeaea;
      }

      .team-section h5 {
        margin-top: 0;
        margin-bottom: 15px;
        color: #2c3e50;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .team-section ul {
        list-style: none; /* Removes default ugly bullets */
        padding: 0;
        margin: 0;
      }

      .team-section li {
        font-size: 13px;
        color: #576574;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
      }

      /* Custom purple bullets */
      .team-section li::before {
        content: "•";
        color: #4a148c;
        font-weight: bold;
        font-size: 18px;
        margin-right: 8px;
      }
      .tasks-container button.active {
        background-color: #4a148c; /* same as hover */
        color: #ffffff;
        border-color: #4a148c;
        box-shadow: 0 4px 6px rgba(74, 20, 140, 0.3);
        transform: translateY(-2px);
      }
      /* Sidebar Card Layout */
      .sidebar-card {
        display: flex;
        flex-direction: column;
        height: 100%;
        font-family: "Segoe UI", sans-serif;
      }

      /* Image Section */
      .sidebar-image img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-bottom: 3px solid #4a148c;
      }

      /* Content Section */
      .sidebar-content {
        padding: 15px;
        overflow-y: auto;
      }

      /* Title */
      .sidebar-content h2 {
        margin-top: 0;
        color: #4a148c;
        font-size: 20px;
        margin-bottom: 10px;
      }

      /* Description */
      .sidebar-content p {
        font-size: 14px;
        color: #444;
        line-height: 1.6;
      }

      /* Optional: Scrollbar styling */
      .sidebar-content::-webkit-scrollbar {
        width: 6px;
      }

      .sidebar-content::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div id="mapdiv"></div>

    <div id="side-bar">
      <div class="sidebar-header">
        <img
          src="{{ url_for('static', filename='images/logo.png') }}"
          alt="Dalarna University Logo"
        />
        <h3><b>Assignment - 01</b></h3>
      </div>

      <div class="tasks-container">
        <button id="btn1">Task 01</button>
        <button id="btn2">Task 02</button>
        <button id="btn3">Task 03</button>
        <button id="btn4">Task 04</button>
        <button id="btn5">Task 05</button>
        <button id="btn51">Task 05.1</button>
        <button id="btn6">Task 06</button>
        <button id="btn7">Task 07</button>
        <button id="btn8">Task 08</button>
      </div>
      <div class="team-section">
        <h5><b>Group Members</b></h5>
        <ul>
          <li>Nadiranga Lakruwan</li>
          <li>Udaya Karunarathna</li>
          <li>Anjana Lakshan</li>
        </ul>
      </div>
    </div>

    <div id="sidebar"><h1>leaflet-sidebar</h1></div>
    <script>
      var mymap;
      var lyrOSM;
      var mrkCurrentLocation;
      var ctlZoomslider;
      var ctlSlidebar;
      var sample = L.geoJson(sample);
      var sample1 = L.geoJson(sample1);
      var geom = L.geoJson(geoFormat);
      var donutCluster;

      var task1Layer = L.featureGroup();
      var task2Layer = L.featureGroup();
      var task3Layer = L.featureGroup();
      var bufferLayer = L.featureGroup();
      var task4Layer = L.featureGroup();
      var task5Layer = L.featureGroup();
      var task51Layer = L.featureGroup();
      var task6Layer = L.featureGroup();
      var task7Layer = L.featureGroup();
      var task8Layer = L.featureGroup();

      const buttons = document.querySelectorAll(".tasks-container button");

      buttons.forEach((button) => {
        button.addEventListener("click", function () {
          // if already active → remove it
          if (this.classList.contains("active")) {
            this.classList.remove("active");
          }
          // otherwise remove others and activate this one
          else {
            buttons.forEach((btn) => btn.classList.remove("active"));
            this.classList.add("active");
          }
        });
      });

      var cities = [
        { name: "Stockholm", coords: [59.32513438341127, 18.06879007394204] },
        { name: "Falun", coords: [60.60678199946571, 15.631190924160876] },
        {
          name: "Gothenburg",
          coords: [57.703686636329536, 11.966862488624855],
        },
        { name: "Malmö", coords: [55.6045170658457, 13.001104185610217] },
        { name: "Uppsala", coords: [59.858230019726165, 17.639540483607277] },
      ];

      $(document).ready(function () {
        mymap = L.map("mapdiv", {
          center: [60.48868922712431, 15.421371459960938],
          zoom: 13,
        });
        lyrOSM = L.tileLayer(
          "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        );
        mymap.addLayer(lyrOSM);

        ctlZoomslider = L.control
          .zoomslider({ position: "topright" })
          .addTo(mymap);

        var sidebar = L.control.sidebar("sidebar", { position: "left" });
        mymap.addControl(sidebar);

        var blackIcon = L.icon({
          iconUrl: "{{ url_for('static', filename='images/map-marker.svg') }}",
          iconSize: [32, 37], // size of the icon
          iconAnchor: [32, 37], // point of the icon which will correspond to marker's location
          popupAnchor: [0, -30], // point from which the popup should open relative to the iconAnchor
        });

        function clearAllTasks() {
          mymap.removeLayer(task1Layer);
          mymap.removeLayer(task2Layer);
          mymap.removeLayer(task3Layer);
          mymap.removeLayer(bufferLayer);
          mymap.removeLayer(task4Layer);
          mymap.removeLayer(task5Layer);
          mymap.removeLayer(task51Layer);
          mymap.removeLayer(task6Layer);
          mymap.removeLayer(task7Layer);
          mymap.removeLayer(task8Layer);
          sidebar.hide();
        }

        //Task - 01
        // POINT
        var point = L.marker([60.49233637261865, 15.401964042166416], {
          icon: blackIcon,
        }).bindPopup(
          "<h3>Locus</h3><img src='{{ url_for('static', filename='images/locus.png' ) }}'  width='120'>",
        );

        // LINE
        var line = L.polyline(
          [
            [60.482370725338484, 15.434717248972277],
            [60.484316080102275, 15.441777259162706],
            [60.486972387134756, 15.438435413671698],
          ],
          { color: "blue" },
        ).bindPopup("<h3>Line Feature</h3>");

        // POLYGON
        var polygon = L.polygon(
          [
            [60.49503135756646, 15.402095116463698],
            [60.492905062530724, 15.396591850545718],
            [60.49129272389621, 15.394267195114764],
            [60.491245988247556, 15.396568129572131],
            [60.486279941783835, 15.411868157663832],
            [60.48747186228695, 15.413955603356698],
            [60.48892080469088, 15.41082443481693],
            [60.49098894097543, 15.408262569647803],
            [60.4936761526688, 15.406009077138691],
            [60.49503135756646, 15.402095116463698],
          ],
          { color: "green" },
        ).bindPopup("<h3>Polygon - Tjärna Ängar</h3>");

        // Add all to layer group
        task1Layer.addLayer(point);
        task1Layer.addLayer(line);
        task1Layer.addLayer(polygon);

        document.getElementById("btn1").addEventListener("click", function () {
          if (mymap.hasLayer(task1Layer)) {
            mymap.removeLayer(task1Layer);
          } else {
            clearAllTasks();
            task1Layer.addTo(mymap);
            mymap.fitBounds(task1Layer.getBounds());
          }
        });

        //Task 02

        var places = [
          {
            coords: [60.605945710824955, 15.627480723964254],
            name: "Dalarna Museum",
            desc: "Välkommen till Dalarnas museum - upptäck Dalarnas fantastiska kulturskatt! Ett besök hos oss rekommenderas starkt som introduktion till en vistelse i Dalarna då det ger en grund för vidare upplevelser av områdets levande kulturhistoria och traditioner. Den borgliknande museibyggnaden i centrala Falun är den perfekta starten för vidare utflykter i länet. Titta in i utställningarna och delta i olika programaktiviteter för att fördjupa er i Dalarnas kulturskatter. Det finns även möjlighet att förgylla ert besök genom att boka en privat guidad visning. Dalarnas museum är länsmuseum i Dalarna och en plats för kunskap, med kulturhistoria som specialgren. Följ oss på Facebook och Instagram",
            img: "dmuseum.jpg",
          },
          {
            coords: [60.60710292455076, 15.625641770889047],
            name: "Polisen Falun",
            desc: "Du kan nå polisen dygnet runt. Ring 112 vid pågående brott och akut fara. Använd polisens webbplats för att anmäla brott, lämna tips, boka tid för att ansöka om pass, begära registerutdrag eller för att se vad som händer lokalt",
            img: "police.jpg",
          },
          {
            coords: [60.607553473840994, 15.62693648192257],
            name: "Ölandsparken",
            desc: "Ölandsparken är en trivsam park som ligger mellan Polishuset och Faluån. Här finns stora perennrabatter och gräsytor med plats för solbad och picnic. Parken anlades 1980 på mark som sedan 1600-talet fyllts ut med slagg. Ölandsgatan och dess omgivningar var tidigare sankmark med öar i Faluån, därav namnet Ö-landet. Parken ritades av den välkända trädgårdsarkitekten Walter Bauer.",
            img: "ola.jpg",
          },
          {
            coords: [60.602746801314424, 15.63251621077319],
            name: "Vårdcentral Tisken",
            desc: "Till oss kan du vända dig med frågor och problem om din hälsa. Här träffar du allmänläkare och distriktssköterskor som kan utreda och behandla våra vanligaste sjukdomar. Om du blir sjuk när vårdcentralen är stängd ska du i första hand kontakta 1177 på telefon för rådgivning.Hos oss kan du till exempel få hjälp med infektioner, sårskador, högt blodtryck och psykiska besvär. Du kan också få stöd att sluta röka, ändra dina matvanor eller göra andra livsstilsförändringar.",
            img: "ward.jpeg",
          },
          {
            coords: [60.603846750975066, 15.624011939389845],
            name: "Vastra Skolan",
            desc: "Bästa skolan jag har gått på!! Lärarna är väldigt snälla och tänker på elevens bästa i alla situationer.Älskar regnbågstimet som går runt och kollar läget och pratar med eleverna.Samt att dom kommer in på vissa lektioner för att kolla läget och hjälpa eleverna. Skolan vill bara elevens bästa!!!! Finns en massa bra människor som man kan prata med om man mår dåligt eller om man mår bra!!",
            img: "school.jpg",
          },
        ];

        places.forEach(function (place) {
          var marker = L.marker(place.coords, { icon: blackIcon });

          marker.on("click", function () {
            document.getElementById("sidebar").innerHTML = `
              <div class="sidebar-card">
    
              <div class="sidebar-image">
                <img src="{{ url_for('static', filename='images/') }}${place.img}" alt="${place.name}">
              </div>

              <div class="sidebar-content">
                <h2>${place.name}</h2>
                <p>${place.desc}</p>
              </div>

            </div>
            `;
            sidebar.show();
          });

          task2Layer.addLayer(marker);
        });

        document.getElementById("btn2").addEventListener("click", function () {
          if (mymap.hasLayer(task2Layer)) {
            mymap.removeLayer(task2Layer);
            sidebar.hide();
          } else {
            clearAllTasks();
            task2Layer.addTo(mymap);
            mymap.fitBounds(task2Layer.getBounds());
          }
        });
        // Task 03

        // Load supermarkets
        var geojsonData = L.geoJSON(supermarket).toGeoJSON();

        //  Step 1: Create buffers for ALL points (store them)
        var buffers = geojsonData.features.map(function (feature) {
          return turf.buffer(feature, 1, { units: "kilometers" });
        });

        //  Step 2: Display buffers (light style → background only)
        var bufferGeo = L.geoJSON(buffers, {
          style: {
            color: "blue",
            fillOpacity: 0.1,
            weight: 1,
          },
        });

        //  Step 3: Classify ALL supermarkets
        var classifiedLayer = L.geoJSON(geojsonData, {
          pointToLayer: function (feature, latlng) {
            var isOverlapping = false;

            // Check against all buffers
            buffers.forEach(function (buffer, index) {
              if (
                turf.booleanPointInPolygon(feature, buffer) &&
                geojsonData.features[index] !== feature
              ) {
                isOverlapping = true;
              }
            });

            return L.circleMarker(latlng, {
              radius: 8,
              color: isOverlapping ? "red" : "green",
              fillColor: isOverlapping ? "red" : "green",
              fillOpacity: 1,
              weight: 2,
            });
          },
          onEachFeature: function (feature, layer) {
            layer.bindPopup(`
      <b>${feature.properties.name}</b><br>
      Status: ${feature.properties ? "Check color" : ""}
    `);
          },
        });

        //  Add layers
        task3Layer.addLayer(bufferGeo);
        task3Layer.addLayer(classifiedLayer);

        // Button
        document.getElementById("btn3").addEventListener("click", function () {
          if (mymap.hasLayer(task3Layer)) {
            mymap.removeLayer(task3Layer);
          } else {
            clearAllTasks();

            task3Layer.addTo(mymap);

            if (task3Layer.getLayers().length > 0) {
              mymap.fitBounds(task3Layer.getBounds());
            }
          }
        });

        //Task 4
        var imageBounds = [
          [60.48245235265036, 15.420486765763563], // south-west
          [60.482193008394475, 15.422592293953846],
          [60.48057270179573, 15.422034641685627],
          [60.48106059977826, 15.419824879426516], // north-east
        ];

        //Create overlay
        var overlay = L.imageOverlay(
          "{{ url_for('static', filename='images/ikea.png') }}",
          imageBounds,
        );

        task4Layer.addLayer(overlay);

        document.getElementById("btn4").addEventListener("click", function () {
          if (mymap.hasLayer(task4Layer)) {
            mymap.removeLayer(task4Layer);
          } else {
            clearAllTasks();

            task4Layer.addTo(mymap);

            mymap.fitBounds(imageBounds);
          }
        });

        // Task 5
        $.getJSON(
          "{{ url_for('static', filename='/js/fuel.geojson') }}",
          function (data) {
            var clusterGroup = L.markerClusterGroup();

            var fuelLayer = L.geoJSON(data, {
              pointToLayer: function (feature, latlng) {
                return L.marker(latlng, { icon: blackIcon });
              },
              onEachFeature: function (feature, layer) {
                layer.bindPopup("<b>" + feature.properties.name + "</b>");
              },
            });

            clusterGroup.addLayer(fuelLayer);

            task5Layer.addLayer(clusterGroup);
          },
        );

        document.getElementById("btn5").addEventListener("click", function () {
          if (mymap.hasLayer(task5Layer)) {
            mymap.removeLayer(task5Layer);
          } else {
            clearAllTasks();

            task5Layer.addTo(mymap);

            if (task5Layer.getLayers().length > 0) {
              mymap.fitBounds(task5Layer.getBounds());
            }
          }
        });

        // Task 5.1 (Donut-style Cluster)

        var task51Layer = L.featureGroup();

        $.getJSON(
          "{{ url_for('static', filename='/js/fuel.geojson') }}",
          function (data) {
            var donutCluster = L.markerClusterGroup({
              iconCreateFunction: function (cluster) {
                var count = cluster.getChildCount();

                return L.divIcon({
                  html: `
                    <div style="
                      background: conic-gradient(red 0% 50%, blue 50% 100%);
                      border-radius: 50%;
                      width: 40px;
                      height: 40px;
                      display:flex;
                      align-items:center;
                      justify-content:center;
                      color:white;
                      font-weight:bold;
                    ">
                      ${count}
                    </div>
                  `,
                  className: "donut-cluster",
                  iconSize: L.point(40, 40),
                });
              },
            });

            var fuelLayer = L.geoJSON(data, {
              pointToLayer: function (feature, latlng) {
                return L.marker(latlng, { icon: blackIcon });
              },
              onEachFeature: function (feature, layer) {
                layer.bindPopup("<b>" + feature.properties.name + "</b>");
              },
            });

            donutCluster.addLayer(fuelLayer);
            task51Layer.addLayer(donutCluster);
          },
        );

        document.getElementById("btn51").addEventListener("click", function () {
          if (mymap.hasLayer(task51Layer)) {
            mymap.removeLayer(task51Layer);
          } else {
            clearAllTasks();

            task51Layer.addTo(mymap);

            if (task51Layer.getLayers().length > 0) {
              mymap.fitBounds(task51Layer.getBounds());
            }
          }
        });

        // Task 6 Layer
        var task6Layer = L.featureGroup();

        // Weather function (CURRENT + FORECAST)
        function getWeather(city, lat, lon) {
          var apiKey = "43be12b76e20e73bf2292d80908b9a81";

          var currentURL = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${apiKey}`;
          var forecastURL = `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=metric&appid=${apiKey}`;

          // Get BOTH APIs together
          Promise.all([$.getJSON(currentURL), $.getJSON(forecastURL)])
            .then(function ([currentData, forecastData]) {
              //  Get forecast (next 3 time slots ~ next 9 hours)
              var forecastHTML = "";
              for (var i = 0; i < 3; i++) {
                var f = forecastData.list[i];
                forecastHTML += `
                <p>
                  <b>${f.dt_txt}</b><br>
                  Temp: ${f.main.temp} °C, ${f.weather[0].description}
                </p>
              `;
              }

              var content = `
              <h3>${city}</h3>
              <hr>
              <h4>Current Weather</h4>
              <p><b>Temperature:</b> ${currentData.main.temp} °C</p>
              <p><b>Weather:</b> ${currentData.weather[0].description}</p>
              <p><b>Humidity:</b> ${currentData.main.humidity}%</p>

              <hr>
              <h4>Forecast (Next Hours)</h4>
              ${forecastHTML}
              `;

              var marker = L.marker([lat, lon], { icon: blackIcon });

              marker.bindPopup(content);

              marker.on("click", function () {
                document.getElementById("sidebar").innerHTML = content;
                sidebar.show();
              });

              task6Layer.addLayer(marker);
            })
            .catch(function (err) {
              console.log("Weather API error for " + city, err);
            });
        }

        // Load cities
        cities.forEach(function (c) {
          getWeather(c.name, c.coords[0], c.coords[1]);
        });

        // Button
        document.getElementById("btn6").addEventListener("click", function () {
          if (mymap.hasLayer(task6Layer)) {
            mymap.removeLayer(task6Layer);
            sidebar.hide();
          } else {
            clearAllTasks();

            task6Layer.addTo(mymap);

            setTimeout(function () {
              if (task6Layer.getLayers().length > 0) {
                mymap.fitBounds(task6Layer.getBounds());
              }
            }, 500);
          }
        });
        // Task 07
        var task7Layer = L.featureGroup();

        Papa.parse("{{ url_for('static', filename='data/school_locs.csv') }}", {
          download: true,
          header: true,
          complete: function (results) {
            var points = [];

            results.data.forEach(function (row) {
              var lat = parseFloat(row.ycoord);
              var lon = parseFloat(row.xcoord);

              if (!isNaN(lat) && !isNaN(lon)) {
                points.push({
                  lat: lat,
                  lon: lon,
                  name: row.Name,
                });
              }
            });

            runKMeans(points, 3); // K = 3
          },
        });

        //  K-MEANS FUNCTION
        function runKMeans(points, k) {
          // Step 1: Random centroids
          var centroids = [];
          for (var i = 0; i < k; i++) {
            var rand = points[Math.floor(Math.random() * points.length)];
            centroids.push({ lat: rand.lat, lon: rand.lon });
          }

          var iterations = 10;

          for (var iter = 0; iter < iterations; iter++) {
            // Step 2: Assign clusters
            var clusters = Array.from({ length: k }, () => []);

            points.forEach(function (p) {
              var minDist = Infinity;
              var clusterIndex = 0;

              centroids.forEach(function (c, index) {
                var dist = getDistance(p, c);
                if (dist < minDist) {
                  minDist = dist;
                  clusterIndex = index;
                }
              });

              clusters[clusterIndex].push(p);
            });

            // Step 3: Update centroids
            centroids = clusters.map(function (cluster, index) {
              if (cluster.length === 0) {
                // keep old centroid (avoid crash)
                return centroids[index];
              }

              var avgLat = 0;
              var avgLon = 0;

              cluster.forEach(function (p) {
                avgLat += p.lat;
                avgLon += p.lon;
              });

              return {
                lat: avgLat / cluster.length,
                lon: avgLon / cluster.length,
              };
            });
          }

          displayKMeans(clusters, centroids);
        }

        //  Distance function (Euclidean)
        function getDistance(p1, p2) {
          return Math.sqrt(
            Math.pow(p1.lat - p2.lat, 2) + Math.pow(p1.lon - p2.lon, 2),
          );
        }

        // DISPLAY RESULT
        function displayKMeans(clusters, centroids) {
          var colors = ["red", "blue", "green"];

          // Draw points
          clusters.forEach(function (cluster, index) {
            cluster.forEach(function (point) {
              var marker = L.circleMarker([point.lat, point.lon], {
                radius: 7,
                color: colors[index],
                fillColor: colors[index],
                fillOpacity: 1,
                weight: 2,
              });

              marker.bindPopup(`
        <b>${point.name}</b><br>
        Cluster: ${index + 1}<br>
        <i>Grouped by distance (K-Means)</i>
      `);

              task7Layer.addLayer(marker);
            });
          });

          //  Draw centroids (important for explanation)
          centroids.forEach(function (c, index) {
            var centroidMarker = L.circleMarker([c.lat, c.lon], {
              radius: 12,
              color: "black",
              fillColor: "yellow",
              fillOpacity: 1,
              weight: 3,
            });

            centroidMarker.bindPopup(`Centroid ${index + 1}`);

            task7Layer.addLayer(centroidMarker);
          });
        }

        // Button
        document.getElementById("btn7").addEventListener("click", function () {
          if (mymap.hasLayer(task7Layer)) {
            mymap.removeLayer(task7Layer);
          } else {
            clearAllTasks();

            task7Layer.addTo(mymap);

            setTimeout(function () {
              if (task7Layer.getLayers().length > 0) {
                mymap.fitBounds(task7Layer.getBounds());
              }
            }, 300);
          }
        });

        // TASK 8
        var task8Layer = L.featureGroup();

        var bufferLayerGroup = L.featureGroup();
        var pointLayerGroup = L.featureGroup();

        var schools = [];
        var population = [];

        Papa.parse("{{ url_for('static', filename='data/school_locs.csv') }}", {
          download: true,
          header: true,
          complete: function (results) {
            schools = results.data;
            loadPopulation();
          },
        });

        function loadPopulation() {
          Papa.parse(
            "{{ url_for('static', filename='data/Stockholm_pop.csv') }}",
            {
              download: true,
              header: true,
              complete: function (results) {
                population = results.data;
                processTask8();
              },
            },
          );
        }

        //  MAIN
        function processTask8() {
          var buffers = [];

          schools.forEach(function (row) {
            var lat = parseFloat(row.ycoord);
            var lon = parseFloat(row.xcoord);

            if (!isNaN(lat) && !isNaN(lon)) {
              var pt = turf.point([lon, lat]);

              var buffer = turf.buffer(pt, 2, { units: "kilometers" });
              buffers.push(buffer);

              //  Draw EACH buffer (clean circles)
              var bufferLayer = L.geoJSON(buffer, {
                style: {
                  color: "blue",
                  fillOpacity: 0.1,
                  weight: 2,
                },
              });

              bufferLayerGroup.addLayer(bufferLayer);
            }
          });

          //  Check population
          checkPopulation(buffers);

          task8Layer.addLayer(bufferLayerGroup);
          task8Layer.addLayer(pointLayerGroup);
        }

        //  CHECK POPULATION AGAINST ALL BUFFERS
        function checkPopulation(buffers) {
          population.forEach(function (row) {
            var lat = parseFloat(row.Latitude);
            var lon = parseFloat(row.Longitude);

            if (!isNaN(lat) && !isNaN(lon)) {
              var pt = turf.point([lon, lat]);

              var inside = false;

              //  Check against EACH buffer
              for (var i = 0; i < buffers.length; i++) {
                if (turf.booleanPointInPolygon(pt, buffers[i])) {
                  inside = true;
                  break;
                }
              }

              // Red OUTSIDE
              if (!inside) {
                var marker = L.circleMarker([lat, lon], {
                  radius: 8,
                  color: "red",
                  fillColor: "red",
                  fillOpacity: 1,
                });

                marker.bindPopup("<b>Outside 2km school buffer</b>");

                pointLayerGroup.addLayer(marker);
              }
              // Green INSIDE
              else {
                var marker = L.circleMarker([lat, lon], {
                  radius: 5,
                  color: "green",
                  fillColor: "green",
                  fillOpacity: 0.8,
                });

                marker.bindPopup("<b>Inside buffer</b>");

                pointLayerGroup.addLayer(marker);
              }
            }
          });
        }

        document.getElementById("btn8").addEventListener("click", function () {
          if (mymap.hasLayer(task8Layer)) {
            mymap.removeLayer(task8Layer);
          } else {
            clearAllTasks();

            task8Layer.addTo(mymap);

            setTimeout(function () {
              if (task8Layer.getLayers().length > 0) {
                mymap.fitBounds(task8Layer.getBounds());
              }
            }, 500);
          }
        });
      });
    </script>
  </body>
